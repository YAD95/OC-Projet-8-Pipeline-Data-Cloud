version: '3.8'

services:
  postgres_db:
    image: postgres:15
    container_name: green_coop_db
    environment:
      POSTGRES_USER: ali_admin
      POSTGRES_PASSWORD: "{{ env_var('DBT_PASSWORD') }}"
      POSTGRES_DB: weather_data
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: